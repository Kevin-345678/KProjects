name: Daily Postmaster Report

on:
  workflow_dispatch:
  schedule:
    # 9:00 AM Asia/Kolkata
    - cron: '30 3 * * *'

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          POSTMASTER_CLIENT_ID: ${{ secrets.POSTMASTER_CLIENT_ID }}
          POSTMASTER_CLIENT_SECRET: ${{ secrets.POSTMASTER_CLIENT_SECRET }}
          POSTMASTER_REFRESH_TOKEN: ${{ secrets.POSTMASTER_REFRESH_TOKEN }}
          POSTMASTER_SENDER_EMAIL: ${{ secrets.POSTMASTER_SENDER_EMAIL }}
          POSTMASTER_SMTP_USERNAME: ${{ secrets.POSTMASTER_SMTP_USERNAME }}
          POSTMASTER_SMTP_PASSWORD: ${{ secrets.POSTMASTER_SMTP_PASSWORD }}
          POSTMASTER_RECIPIENTS: ${{ secrets.POSTMASTER_RECIPIENTS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python monitor.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/state.json
          git diff --cached --quiet || git commit -m "Update Postmaster state"
          git push
